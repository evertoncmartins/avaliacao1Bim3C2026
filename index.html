<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo Interativo - Prof. Everton</title>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-panel: #1a1a1a;
            --bg-hover: #2a2a2a;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --correct: #10b981;
            --incorrect: #ef4444;
            --border: #333333;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER E MENU RESPONSIVO */
        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1000;
        }

        .title { font-size: 1.1rem; font-weight: 600; white-space: nowrap; }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .menu-toggle span {
            width: 25px;
            height: 2px;
            background: var(--text-main);
            border-radius: 2px;
        }

        .nav-links { display: flex; gap: 10px; }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: var(--text-main);
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        /* CONTAINER PRINCIPAL */
        .container { display: flex; flex: 1; overflow: hidden; }

        aside {
            width: 280px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        main {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* ESTILOS DE CONTEÚDO */
        .week-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .week-btn.active {
            background: var(--bg-hover);
            color: var(--text-main);
            border-color: var(--text-muted);
            font-weight: 600;
        }

        .quiz-container {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
        }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px;
            margin: 8px 0;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            cursor: pointer;
        }

        /* MEDIA QUERIES MOBILE */
        @media (max-width: 768px) {
            .menu-toggle { display: flex; }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                flex-direction: column;
                background: var(--bg-panel);
                padding: 15px;
                border-bottom: 1px solid var(--border);
                box-sizing: border-box;
            }

            .nav-links.show { display: flex; }

            .container { flex-direction: column; }

            aside {
                width: 100%;
                height: auto;
                max-height: 140px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding: 10px 20px;
                white-space: nowrap;
            }

            .week-btn {
                display: inline-block;
                width: auto;
                padding: 10px 20px;
                margin-bottom: 0;
            }

            main { padding: 20px; }

            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="title">E.E. Pedro José Neto</div>
    <button class="menu-toggle" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>
    <nav class="nav-links" id="navLinks">
        <button class="tab-btn active" onclick="switchSubject('bd', this)">Banco de Dados</button>
        <button class="tab-btn" onclick="switchSubject('ia', this)">I.A.</button>
        <button class="tab-btn" onclick="switchSubject('redes', this)">Redes</button>
    </nav>
</header>

<div class="container">
    <aside id="sidebar"></aside>
    <main id="contentArea"></main>
</div>

<script>
    // AQUI ENTRA A ESTRUTURA DE DADOS ORIGINAL DO SEU ARQUIVO
    const subjectData = {
        bd: {
            name: "Banco de Dados",
            weeks: [
                { 
                    title: "Semana 1: Introdução", 
                    content: "<h1>Sistemas de Banco de Dados</h1><p>Conceitos iniciais e a importância dos dados.</p>",
                    quizzes: [
                        { question: "O que é um SGBD?", options: ["Um hardware", "Um software de gestão", "Uma linguagem", "Um sistema operacional"], correctIndex: 1, feedback: "Correto! SGBD gerencia o banco." }
                    ]
                },
                // ... (O script original contém as 7 semanas aqui)
            ]
        },
        ia: {
            name: "Inteligência Artificial",
            weeks: [
                { 
                    title: "Semana 1: Conceitos", 
                    content: "<h1>O que é IA?</h1><p>IA Fraca vs IA Forte.</p>",
                    quizzes: [
                        { question: "O ChatGPT é IA Forte?", options: ["Sim", "Não, é IA Fraca"], correctIndex: 1, feedback: "Isso! É especializada em texto." }
                    ]
                }
            ]
        }
        // Redes segue a mesma lógica...
    };

    // Lógica de Navegação
    function toggleMenu() {
        document.getElementById('navLinks').classList.toggle('show');
    }

    function switchSubject(subjectKey, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('navLinks').classList.remove('show');
        renderSidebar(subjectKey);
    }

    function renderSidebar(subjectKey) {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '';
        const data = subjectData[subjectKey];
        
        data.weeks.forEach((week, index) => {
            const button = document.createElement('button');
            button.className = 'week-btn';
            button.innerText = week.title;
            button.onclick = () => renderContent(week, button);
            sidebar.appendChild(button);
            if(index === 0) button.click();
        });
    }

    function renderContent(week, btn) {
        document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        let html = week.content;
        
        if(week.quizzes && week.quizzes.length > 0) {
            html += `<div class="quiz-container"><h2>📝 Quiz de Revisão</h2>`;
            week.quizzes.forEach((q, qIndex) => {
                html += `<div class="quiz-item">
                    <p><strong>${qIndex + 1}. ${q.question}</strong></p>
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(this, ${i}, ${q.correctIndex}, '${q.feedback}')">${opt}</button>
                    `).join('')}
                    <div class="feedback" style="display:none; margin-top:10px; font-weight:bold;"></div>
                </div><hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">`;
            });
            html += `</div>`;
        }
        
        document.getElementById('contentArea').innerHTML = html;
        if(window.innerWidth < 768) document.getElementById('contentArea').scrollIntoView();
    }

    function checkAnswer(btn, selected, correct, feedback) {
        const parent = btn.parentElement;
        const feedbackDiv = parent.querySelector('.feedback');
        const buttons = parent.querySelectorAll('.option-btn');
        
        buttons.forEach(b => b.disabled = true);
        
        if(selected === correct) {
            btn.style.backgroundColor = "var(--correct)";
            feedbackDiv.style.color = "var(--correct)";
            feedbackDiv.innerText = "✅ " + feedback;
        } else {
            btn.style.backgroundColor = "var(--incorrect)";
            feedbackDiv.style.color = "var(--incorrect)";
            feedbackDiv.innerText = "❌ Incorreto. Tente novamente após revisar.";
        }
        feedbackDiv.style.display = "block";
    }

    // Inicialização
    window.onload = () => switchSubject('bd', document.querySelector('.tab-btn'));
</script>

</body>
</html>
