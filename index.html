<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo Interativo - Desenvolvimento de Sistemas</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --bg-hover: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #4da6ff;
            --accent-hover: #3388dd;
            --correct: #2e7d32;
            --incorrect: #c62828;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            line-height: 1.6;
        }

        /* Sidebar de Navegação */
        #sidebar {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        .nav-content {
            flex-grow: 1;
            overflow-y: auto;
        }

        .discipline-btn {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-main);
            text-align: left;
            padding: 15px 20px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        .discipline-btn:hover { background-color: var(--bg-hover); }

        .week-list {
            list-style: none;
            display: none;
            background-color: #171717;
        }

        .week-list.active { display: block; }

        .week-btn {
            width: 100%;
            background: none;
            border: none;
            color: var(--text-muted);
            text-align: left;
            padding: 12px 20px 12px 40px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .week-btn:hover, .week-btn.selected {
            background-color: var(--bg-hover);
            color: var(--accent);
            border-left: 4px solid var(--accent);
            padding-left: 36px;
        }

        /* Área de Conteúdo Principal */
        #main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .content-container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { color: var(--accent); margin-bottom: 10px; }
        h2 { margin-top: 30px; margin-bottom: 15px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        h3 { margin-top: 20px; margin-bottom: 10px; color: #ddd; }
        p { margin-bottom: 15px; }
        ul { margin-bottom: 15px; padding-left: 20px; }
        li { margin-bottom: 5px; }

        /* Quizzes */
        .quiz-container {
            background-color: var(--bg-panel);
            padding: 25px;
            border-radius: 8px;
            margin-top: 40px;
            border: 1px solid var(--border);
        }

        .question-block { margin-bottom: 25px; }
        .question-text { font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; }
        
        .option-label {
            display: block;
            padding: 10px 15px;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover { background-color: var(--bg-hover); }
        .option-label input { margin-right: 10px; }

        .btn-submit {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: var(--accent-hover); }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            font-weight: bold;
        }
        .feedback.correct { display: block; background-color: rgba(46, 125, 50, 0.2); color: #4caf50; border: 1px solid var(--correct); }
        .feedback.incorrect { display: block; background-color: rgba(198, 40, 40, 0.2); color: #ef5350; border: 1px solid var(--incorrect); }

        /* Bloco LaTeX (Para o Professor) */
        .latex-container {
            margin-top: 50px;
            background-color: #000;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed #555;
        }
        .latex-container h3 { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        pre { white-space: pre-wrap; color: #a5d6ff; font-family: monospace; font-size: 0.9rem; }

        /* Menu Mobile */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 2000;
            background-color: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-toggle { display: block; }
            #sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            #main-content { padding: 60px 20px 20px 20px; }
        }
    </style>
</head>

                        question: {

        const alphabet = ['A', 'B', 'C', 'D', 'E'];
        let currentDiscipline = null;
        let currentWeek = null;

        // Build Sidebar Menu
        function buildMenu() {
            const navContainer = document.getElementById('nav-container');
            for (const [key, disc] of Object.entries(contentData)) {
                
                const btnDisc = document.createElement('button');
                btnDisc.className = 'discipline-btn';
                btnDisc.textContent = disc.name;
                
                const ulWeeks = document.createElement('ul');
                ulWeeks.className = 'week-list';
                ulWeeks.id = `list-${key}`;

                disc.weeks.forEach((week, index) => {
                    const li = document.createElement('li');
                    const btnWeek = document.createElement('button');
                    btnWeek.className = 'week-btn';
                    btnWeek.textContent = week.title;
                    btnWeek.onclick = () => loadContent(key, index, btnWeek);
                    li.appendChild(btnWeek);
                    ulWeeks.appendChild(li);
                });

                btnDisc.onclick = () => {
                    const isOpen = ulWeeks.classList.contains('active');
                    document.querySelectorAll('.week-list').forEach(el => el.classList.remove('active'));
                    if (!isOpen) ulWeeks.classList.add('active');
                };

                navContainer.appendChild(btnDisc);
                navContainer.appendChild(ulWeeks);
            }
        }

        // Load Content
        function loadContent(discKey, weekIndex, btnElement) {
            document.querySelectorAll('.week-btn').forEach(btn => btn.classList.remove('selected'));
            if(btnElement) btnElement.classList.add('selected');

            if(window.innerWidth <= 768) toggleMenu(); // auto-close mobile menu

            const discipline = contentData[discKey];
            const week = discipline.weeks[weekIndex];

            document.getElementById('disc-title').textContent = discipline.name;
            document.getElementById('week-title').textContent = week.title;
            document.getElementById('text-content').innerHTML = week.text;

            renderQuiz(week.question);
            renderLatex(week.question);
        }

        function renderQuiz(q) {
            const quizArea = document.getElementById('quiz-area');
            quizArea.innerHTML = `
                <div class="quiz-container">
                    <h2 style="margin-top:0; border:none;">Quiz de Fixação</h2>
                    <div class="question-block">
                        <div class="question-text">${q.text}</div>
                        <div id="options-container">
                            ${q.options.map((opt, i) => `
                                <label class="option-label">
                                    <input type="radio" name="quiz" value="${i}">
                                    <strong>${alphabet[i]})</strong> ${opt}
                                </label>
                            `).join('')}
                        </div>
                        <button class="btn-submit" onclick="checkAnswer(${q.correct})">Responder</button>
                        <div id="feedback-msg" class="feedback"></div>
                    </div>
                </div>
            `;
        }

        function checkAnswer(correctIndex) {
            const selected = document.querySelector('input[name="quiz"]:checked');
            const feedback = document.getElementById('feedback-msg');
            
            if (!selected) {
                feedback.textContent = "Por favor, selecione uma alternativa.";
                feedback.className = "feedback incorrect";
                return;
            }

            const val = parseInt(selected.value);
            if (val === correctIndex) {
                feedback.innerHTML = `Acertou! A alternativa correta é a <strong>${alphabet[correctIndex]}</strong>. Muito bem.`;
                feedback.className = "feedback correct";
            } else {
                feedback.innerHTML = `Incorreto. A alternativa correta era a <strong>${alphabet[correctIndex]}</strong>. Tente ler o resumo novamente.`;
                feedback.className = "feedback incorrect";
            }
        }

        function renderLatex(q) {
            const latexArea = document.getElementById('latex-area');
            const latexCode = `\\begin{question}
${q.text}
\\begin{alternatives}
  \\item ${q.options[0]}
  \\item ${q.options[1]}
  \\item ${q.options[2]}
  \\item ${q.options[3]}
  \\item ${q.options[4]}
\\end{alternatives}
\\correctanswer{${alphabet[q.correct]}}
\\end{question}`;

            latexArea.innerHTML = `
                <div class="latex-container">
                    <h3>Código LaTeX da Questão (Para o Professor)</h3>
                    <pre><code>${latexCode}</code></pre>
                </div>
            `;
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // Init
        buildMenu();
    </script>
</body>
</html>
