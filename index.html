<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo Interativo - 3C 2026</title>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-panel: #1a1a1a;
            --bg-hover: #2a2a2a;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --border: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER RESPONSIVO */
        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            z-index: 1000;
        }

        .title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: var(--text-main);
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        /* BOTÃO HAMBÚRGUER (Escondido no Desktop) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--text-main);
            border-radius: 2px;
        }

        /* CONTAINER PRINCIPAL */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        aside {
            width: 260px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .week-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px;
            margin-bottom: 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
        }

        .week-btn.active {
            background: var(--bg-hover);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* MEDIA QUERIES PARA MOBILE */
        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            
            .menu-toggle { display: flex; }

            .nav-links {
                display: none; /* Esconde as abas no mobile */
                width: 100%;
                flex-direction: column;
                padding-top: 15px;
            }

            .nav-links.show {
                display: flex;
            }

            .container { flex-direction: column; }

            aside {
                width: 100%;
                height: 180px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            main { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="title">Avaliação 1º Bimestre</div>
        
        <button class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>

        <nav class="nav-links" id="navLinks">
            <button class="tab-btn active" onclick="changeSubject('bd')">Banco de Dados</button>
            <button class="tab-btn" onclick="changeSubject('ia')">Inteligência Artificial</button>
            <button class="tab-btn" onclick="changeSubject('redes')">Redes</button>
        </nav>
    </header>

    <div class="container">
        <aside id="sidebar">
            </aside>
        <main id="content">
            <h1>Bem-vindo, Everton.</h1>
            <p>Selecione uma disciplina e uma semana para revisar o conteúdo.</p>
        </main>
    </div>

    <script>
        // Exemplo de estrutura de dados (Simplificada para o exemplo)
        const data = {
            bd: [
                { title: "Semana 1: Introdução", content: "<h1>Conceitos de BD</h1><p>Conteúdo da aula de Banco de Dados...</p>" },
                { title: "Semana 2: Modelagem", content: "<h1>Entidades e Atributos</h1><p>Explicação sobre DER...</p>" }
            ],
            ia: [
                { title: "Semana 1: O que é IA?", content: "<h1>IA e Machine Learning</h1><p>Introdução ao mundo da IA...</p>" }
            ]
        };

        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('show');
        }

        function changeSubject(subject) {
            const sidebar = document.getElementById('sidebar');
            const navLinks = document.getElementById('navLinks');
            
            // Fecha menu mobile ao selecionar
            navLinks.classList.remove('show');

            // Atualiza botões ativos
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Limpa e popula sidebar
            sidebar.innerHTML = '';
            if (data[subject]) {
                data[subject].forEach((item, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'week-btn';
                    btn.innerText = item.title;
                    btn.onclick = () => {
                        document.getElementById('content').innerHTML = item.content;
                        document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    sidebar.appendChild(btn);
                });
            }
        }

        // Iniciar com a primeira disciplina
        window.onload = () => changeSubject('bd');
    </script>
</body>
</html>
