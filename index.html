<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumo Interativo de Disciplinas</title>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-panel: #1a1a1a;
            --bg-hover: #2a2a2a;
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --correct: #10b981;
            --incorrect: #ef4444;
            --border: #333333;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-right: 30px;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--text-main);
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.1);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        aside {
            width: 280px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
        }

        .week-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            margin-bottom: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .week-btn:hover {
            background-color: var(--bg-hover);
            color: var(--text-main);
        }

        .week-btn.active {
            background-color: var(--border);
            color: var(--text-main);
            font-weight: 500;
            border-color: var(--text-muted);
        }

        main {
            flex: 1;
            padding: 40px 60px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 10px;
            color: #ffffff;
        }

        h2 {
            font-size: 1.4rem;
            margin-top: 35px;
            margin-bottom: 15px;
            color: var(--primary-hover);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        p, li {
            line-height: 1.7;
            font-size: 1.05rem;
            color: #d4d4d4;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 10px;
        }

        strong {
            color: #ffffff;
            font-weight: 600;
        }

        .quiz-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid var(--border);
            margin-bottom: 60px;
        }

        .quiz-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #ffffff;
        }

        .question-block {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px 20px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--bg-hover);
            border-color: var(--text-muted);
        }

        .option-btn.correct {
            border-color: var(--correct);
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--correct);
        }

        .option-btn.incorrect {
            border-color: var(--incorrect);
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--incorrect);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback-msg {
            margin-top: 15px;
            font-size: 0.95rem;
            padding: 12px;
            border-radius: 6px;
            display: none;
            line-height: 1.5;
        }

        .feedback-msg.correct {
            display: block;
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--correct);
            color: var(--correct);
        }

        .feedback-msg.incorrect {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--incorrect);
            color: var(--incorrect);
        }
    </style>
</head>

                        <h1>Levantamento de Dados e Conceitos Fundamentais</h1>
                        <p>A modelagem de dados surgiu da necessidade de organizar e gerenciar de forma eficiente grandes quantidades de dados acumulados pelas empresas. Uma abordagem estruturada é fundamental para garantir a integridade, a consistência e a acessibilidade das informações.</p>
                        <h2>Tipos de Bancos de Dados</h2>

                            <li><strong>Relacionais (RDBMS):</strong> Ideais para alta integridade e transações complexas (ex: MySQL, PostgreSQL, Oracle). Utilizam tabelas e relações definidas por chaves primárias e estrangeiras.</li>

                            <li><strong>Modelagem Conceitual:</strong> Foco nas entidades e relacionamentos de alto nível.</li>
                            <li><strong>Modelagem Lógica:</strong> Transforma o modelo conceitual em tabelas e define chaves.</li>

                        <h1>Relacionamentos 1:1, 1:N e N:M</h1>

                        <h2>Muitos-para-Muitos (N:M)</h2>
                        <p>Ocorre quando múltiplas instâncias de uma entidade estão associadas a múltiplas instâncias de outra. Exemplo: Autores e Livros. <strong>Importante:</strong> Relacionamentos N:M exigem a criação de uma tabela de junção (ou associativa) no modelo lógico.</p>
                    `,

                        <h1>Fundamentos da Normalização (1FN e 2FN)</h1>
                        <p>A normalização organiza os dados para reduzir redundâncias, melhorar a integridade e facilitar a manutenção, evitando anomalias de inserção, atualização e exclusão.</p>
                        <h2>Primeira Forma Normal (1NF)</h2>
                        <p>Garante que todos os atributos sejam atômicos. Ou seja, cada coluna deve conter valores indivisíveis e cada entrada deve ter apenas um valor por coluna. Elimina grupos de repetição.</p>

                        <p>Para resolver um problema, primeiro precisamos entender as dores de quem sofre com ele. O Mapa de Empatia explora: <em>O que o usuário vê? O que ele ouve? O que pensa e sente? O que fala e faz? Quais as suas dores e necessidades (ganhos)?</em> Indo muito além de dados demográficos rasos.</p>
                    `,
                    quizzes: [
                        {
                            question: "Qual o objetivo de utilizar um Mapa de Empatia?",
                            options: ["Criar um orçamento realista para o cliente.", "Entender profundamente o problema, necessidades, dores e percepções do usuário alvo.", "Definir o tempo necessário para executar cada etapa do projeto.", "Programar a interface visual da aplicação."],
                            correctIndex: 1,
                            feedback: "Correto. O Design Thinking exige empatia verdadeira para gerar soluções úteis ao cliente real."
                        },
                        {
                            question: "O Design Thinking é conhecido por ter qual entidade no centro do processo criativo?",
                            options: ["O Lucro da Empresa", "O Gerente de Projetos", "O Banco de Dados", "O Ser Humano (Usuário)"],
                            correctIndex: 3,
                            feedback: "Perfeito! A abordagem 'Human-centered' é o coração do Design Thinking."
                        },
                        {
                            question: "Quais são as 5 fases clássicas do Design Thinking?",
                            options: ["Empatia, Definição, Ideação, Prototipagem e Teste.", "Levantamento, Codificação, Banco de Dados, Redes e Suporte.", "Iniciação, Planejamento, Execução, Monitoramento e Encerramento.", "Apresentação, Avaliação, Feedback, Refatoração e Venda."],
                            correctIndex: 0,
                            feedback: "Isso aí. Começamos sentindo a dor do usuário, geramos ideias, fazemos protótipos e testamos."
                        }
                    ]
                },
                {
                    title: "Semana 5: Design Thinking - Definição (Matriz CSD)",
                    content: `
                        <h1>Estruturando o Problema</h1>
                        <p>Após compreender o usuário na fase de empatia, organizamos essas percepções usando a <strong>Matriz CSD</strong> (Certezas, Suposições e Dúvidas) para definir com clareza o problema/desafio.</p>
                        <h2>A Matriz CSD</h2>
                        <ul>
                            <li><strong>Certezas:</strong> Fatos validados e confirmados sobre o problema e o usuário.</li>
                            <li><strong>Suposições:</strong> Hipóteses e achismos que a equipe tem e que precisarão ser testadas.</li>
                            <li><strong>Dúvidas:</strong> Incertezas e perguntas diretas que exigem pesquisa ou investigação complementar antes de criar o produto.</li>
                        </ul>
                    `,
                    quizzes: [
                        {
                            question: "Na Matriz CSD, em qual categoria devemos colocar uma informação que a equipe 'acha' ser verdadeira, mas ainda não comprovou?",
                            options: ["Certezas", "Variáveis", "Dúvidas", "Suposições"],
                            correctIndex: 3,
                            feedback: "Certo! Suposições são hipóteses que guiarão a próxima fase de testes e entrevistas do projeto."
                        },
                        {
                            question: "Qual o propósito principal de usar a Matriz CSD no desenvolvimento de um produto para a comunidade local?",
                            options: ["Decidir qual linguagem de programação (Python, JS) será usada.", "Calcular as notas finais dos alunos na disciplina.", "Ajudar a equipe a alinhar o que já sabe e direcionar onde precisa de pesquisa antes de programar.", "Gerar senhas criptografadas para os usuários."],
                            correctIndex: 2,
                            feedback: "Exato! A matriz tira as incertezas da cabeça de cada um e organiza num quadro visual para toda a equipe."
                        },
                        {
                            question: "Se a equipe sabe documentadamente que '70% dos alunos usam ônibus para chegar à escola', onde esse fato se encaixa na matriz?",
                            options: ["Dúvidas", "Certezas", "Suposições", "Ideias"],
                            correctIndex: 1,
                            feedback: "Muito bem! Fatos comprovados por dados ou pesquisas prévias são Certezas."
                        }
                    ]
                },
                {
                    title: "Semana 6: Planejamento Ágil com Scrum",
                    content: `
                        <h1>O Framework Scrum</h1>
                        <p>O Scrum é um framework ágil simples e objetivo focado na entrega de valor. Ele preza por três pilares essenciais: <strong>Transparência, Inspeção e Adaptação</strong>.</p>
                        <h2>Dinâmica do Scrum</h2>
                        <p>Projetos são divididos em ciclos curtos chamados <em>Sprints</em>. O conjunto completo de requisitos fica no <em>Product Backlog</em>. No planejamento da Sprint (Sprint Planning), os itens são movidos para o <em>Sprint Backlog</em>.</p>
                        <p>O progresso é inspecionado através de reuniões diárias rápidas e ajustes ocorrem na Revisão da Sprint.</p>
                    `,
                    quizzes: [
                        {
                            question: "Quais são os três pilares que sustentam o controle empírico no framework Scrum?",
                            options: ["Custos, Escopo e Cronograma.", "Transparência, Inspeção e Adaptação.", "Iniciação, Planejamento e Execução.", "Ideação, Prototipagem e Teste."],
                            correctIndex: 1,
                            feedback: "Exato. Sem transparência não há inspeção, e sem inspeção não há adaptação."
                        },
                        {
                            question: "No Scrum, como chamamos o ciclo curto de trabalho de tempo fixo (ex: 2 a 4 semanas) no qual criamos a funcionalidade?",
                            options: ["Waterfall", "Sprint", "Checkpoint", "Deadline"],
                            correctIndex: 1,
                            feedback: "Correto! A Sprint é o coração do Scrum, gerando ciclos de entrega contínua."
                        },
                        {
                            question: "A lista completa de tudo que o produto/software vai precisar, priorizada do mais importante ao menos importante, chama-se:",
                            options: ["Termo de Abertura", "Mapa de Empatia", "Product Backlog", "Requisitos Cascateados"],
                            correctIndex: 2,
                            feedback: "Perfeito! O Product Backlog é a fonte única de requisitos gerenciada pelo Product Owner."
                        }
                    ]
                },
                {
                    title: "Semana 7: Escopo e Objetivos SMART",
                    content: `
                        <h1>Definição do Escopo e Metas</h1>
                        <p>O escopo detalha o que o projeto vai entregar, envolvendo as Partes Interessadas, Justificativa, Descrição do Produto, Tempo, Custo e Riscos.</p>
                        <h2>Objetivos SMART</h2>
                        <p>A finalidade do projeto deve ser clara. O método SMART assegura que o objetivo seja:</p>
                        <ul>
                            <li><strong>S (Specific):</strong> Específico e direto.</li>
                            <li><strong>M (Measurable):</strong> Mensurável (com métricas).</li>
                            <li><strong>A (Achievable):</strong> Alcançável e realista.</li>
                            <li><strong>R (Relevant):</strong> Relevante e focado no problema.</li>
                            <li><strong>T (Time-bound):</strong> Temporal (com um prazo definido).</li>
                        </ul>
                    `,
                    quizzes: [
                        {
                            question: "O que significa a letra 'M' na metodologia SMART de definição de metas?",
                            options: ["Memorável", "Mensurável", "Mutável", "Multidisciplinar"],
                            correctIndex: 1,
                            feedback: "Correto. O objetivo deve ser mensurável, permitindo medir se o sucesso foi alcançado."
                        },
                        {
                            question: "Um objetivo formulado como: 'Melhorar o aplicativo do TCC' possui um grande erro segundo o método SMART. Qual é?",
                            options: ["Ele é muito caro para implementar.", "Ele não é Específico (S) e nem Temporal (T). Melhorar em quê? Até quando?", "Ele não usa a linguagem de programação certa.", "Ele foi definido na fase de encerramento."],
                            correctIndex: 1,
                            feedback: "Isso mesmo! Falta especificidade. Um bom objetivo seria: 'Aumentar a base de usuários do app em 20% até dezembro deste ano'."
                        },
                        {
                            question: "Ao definirmos um objetivo como 'Alcançável' (Achievable), o que a equipe do projeto está avaliando?",
                            options: ["Se temos os recursos e o conhecimento para construir a solução, sem propor algo irreal.", "Se o design visual será agradável.", "Apenas o orçamento financeiro de longo prazo.", "Se o usuário achará a ideia relevante."],
                            correctIndex: 0,
                            feedback: "Exato! Propor criar uma inteligência artificial autoconsciente para amanhã não é alcançável (A)."
                        }
                    ]
                }
            ]
        };

        // Combinação de todas as disciplinas
        const allData = [dbContent, aiContent, pmdContent];

        let currentDisciplineIndex = 0;
        let currentWeekIndex = 0;

        const tabsContainer = document.getElementById('discipline-tabs');
        const navContainer = document.getElementById('week-nav');
        const contentContainer = document.getElementById('lesson-content');
        const quizContainer = document.getElementById('quiz-container');

        function init() {
            renderTabs();
            renderView();
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            allData.forEach((discipline, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${index === currentDisciplineIndex ? 'active' : ''}`;
                btn.textContent = discipline.name;
                btn.onclick = () => {
                    currentDisciplineIndex = index;
                    currentWeekIndex = 0;
                    renderTabs();
                    renderView();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderView() {
            const discipline = allData[currentDisciplineIndex];
            
            navContainer.innerHTML = '';
            discipline.weeks.forEach((week, index) => {
                const btn = document.createElement('button');
                btn.className = `week-btn ${index === currentWeekIndex ? 'active' : ''}`;
                btn.textContent = `Semana ${index + 1}`;
                btn.onclick = () => {
                    currentWeekIndex = index;
                    renderView();
                };
                navContainer.appendChild(btn);
            });

            const currentWeek = discipline.weeks[currentWeekIndex];
            
            // Renderiza o conteúdo teórico
            contentContainer.innerHTML = currentWeek.content;
            
            // Renderiza os quizzes dinamicamente
            quizContainer.innerHTML = '<h3 class="quiz-title">Testando o Conhecimento</h3>';
            
            if(currentWeek.quizzes && currentWeek.quizzes.length > 0) {
                currentWeek.quizzes.forEach((quiz, qIndex) => {
                    const block = document.createElement('div');
                    block.className = 'question-block';
                    
                    const qText = document.createElement('div');
                    qText.className = 'question-text';
                    qText.textContent = `${qIndex + 1}. ${quiz.question}`;
                    block.appendChild(qText);

                    const optionsGrid = document.createElement('div');
                    optionsGrid.className = 'options-grid';

                    const feedbackDiv = document.createElement('div');
                    feedbackDiv.className = 'feedback-msg';

                    quiz.options.forEach((optText, optIndex) => {
                        const optBtn = document.createElement('button');
                        optBtn.className = 'option-btn';
                        optBtn.textContent = optText;
                        
                        optBtn.onclick = () => {
                            // Desabilita botões após escolha
                            const allBtns = optionsGrid.querySelectorAll('.option-btn');
                            allBtns.forEach(b => b.disabled = true);
                            
                            // Lógica de feedback e correção visual
                            if(optIndex === quiz.correctIndex) {
                                optBtn.classList.add('correct');
                                feedbackDiv.classList.add('correct');
                                feedbackDiv.textContent = quiz.feedback || "Resposta correta!";
                            } else {
                                optBtn.classList.add('incorrect');
                                allBtns[quiz.correctIndex].classList.add('correct');
                                feedbackDiv.classList.add('incorrect');
                                feedbackDiv.textContent = "Incorreto. A resposta certa está destacada em verde. Fique atento a este detalhe!";
                            }
                        };
                        optionsGrid.appendChild(optBtn);
                    });

                    block.appendChild(optionsGrid);
                    block.appendChild(feedbackDiv);
                    quizContainer.appendChild(block);
                });
            } else {
                quizContainer.innerHTML += '<p>Não há quiz para esta semana no momento.</p>';
            }
        }

        // Inicializa a aplicação
        init();
    </script>
</body>
</html>
